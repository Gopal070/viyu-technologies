services:
  - type: web
    name: viyu-technologies
    env: node
    plan: free
    region: singapore # Choose the region closest to your users
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false # User must provide this in Render Dashboard
      - key: JWT_SECRET
        generateValue: true # Generates a secure random string automatically
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: NODE_ENV
        value: production
